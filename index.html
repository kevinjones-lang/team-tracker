<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Bly Team Conversion Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{--bg:#0f1420;--panel:#181f30;--panel2:#1f2740;--line:#2b3450;--text:#e9edf6;
    --muted:#93a0bd;--accent:#4f8cff;--good:#22c55e;--warn:#f59e0b;--bad:#ef4444;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
  .wrap{max-width:1240px;margin:0 auto;padding:0 20px 70px}
  .topbar{position:sticky;top:0;z-index:100;background:var(--bg);padding:16px 0 12px;margin-bottom:16px;border-bottom:1px solid var(--line);box-shadow:0 6px 16px -8px rgba(0,0,0,.6)}
  header.top{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:14px}
  h1{font-size:21px;margin:0}
  .sub{color:var(--muted);font-size:13px}
  select.periodSel{background:var(--panel);color:var(--text);border:1px solid var(--line);
    border-radius:10px;padding:8px 12px;font-size:14px;font-weight:600}
  .tabs{display:flex;gap:6px;margin:14px 0 0;flex-wrap:wrap}
  .tab{background:var(--panel);border:1px solid var(--line);color:var(--muted);
    padding:8px 16px;border-radius:999px;cursor:pointer;font-size:14px;font-weight:600}
  .tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .grid{display:grid;gap:14px}.cards{grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px 17px}
  .card .label{color:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .card .value{font-size:25px;font-weight:700;margin-top:6px}
  .card .delta{font-size:12px;margin-top:5px;font-weight:600}
  .up{color:var(--good)}.down{color:var(--bad)}.flat{color:var(--muted)}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;margin-top:18px}
  .panel h2{font-size:15px;margin:0 0 14px}.panel h2 .hint{color:var(--muted);font-weight:400;font-size:12px;margin-left:8px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:18px}@media(max-width:860px){.two{grid-template-columns:1fr}}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:middle}
  .chartbox{position:relative;height:260px}
  .goaledit{display:grid;grid-template-columns:1fr 96px;gap:8px 12px;align-items:center;margin-bottom:2px}
  .goaledit label{font-size:13px;color:var(--muted)}
  .goaledit input{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:6px 8px;font-size:13px;width:100%;text-align:right}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:9px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer}
  .btn.ghost{background:var(--panel2);color:var(--text);border:1px solid var(--line)}
  .track{background:var(--panel2);border-radius:999px;height:12px;position:relative;overflow:hidden;margin-top:3px}
  .track .fill{position:absolute;left:0;top:0;bottom:0;border-radius:999px}
  .track .goalmark{position:absolute;top:-3px;bottom:-3px;width:2px;background:#fff;opacity:.7}
  .funnel-row{display:flex;align-items:center;gap:12px;margin:0 0 8px}
  .funnel-name{width:150px;font-size:13px;color:var(--muted);text-align:right}
  .funnel-bar{position:relative;flex:1;background:var(--panel2);border-radius:8px;height:34px;overflow:hidden}
  .funnel-fill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--accent),#7aa8ff);display:flex;align-items:center;padding-left:12px;font-weight:700;font-size:13px;color:#fff;border-radius:8px;min-width:44px}
  .conv{width:96px;font-size:12px;color:var(--muted)}.conv b{color:var(--text)}
  .slider{margin-bottom:14px}
  .slider .row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
  .slider .row .v{font-weight:700;color:var(--text)}
  .slider input[type=range]{width:100%;-webkit-appearance:none;height:6px;border-radius:999px;background:var(--panel2);outline:none}
  .slider input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid #0f1420}
  .fcout{background:var(--panel2);border-radius:12px;padding:14px 16px;margin-bottom:10px}
  .fcout .big{font-size:26px;font-weight:700}.fcout .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .fcin{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:7px 9px;font-size:14px;width:130px;text-align:right}
  .banner{background:rgba(79,140,255,.1);border:1px solid rgba(79,140,255,.35);color:#bcd2ff;padding:10px 14px;border-radius:12px;font-size:13px;margin:14px 0 0}
  footer{color:var(--muted);font-size:12px;margin-top:26px;text-align:center;line-height:1.7}
  #lock{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
  #lock .box{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:32px 30px;width:340px;text-align:center}
  #lock h2{margin:0 0 6px;font-size:18px}#lock p{color:var(--muted);font-size:13px;margin:0 0 18px}
  #lock input{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:11px 12px;font-size:15px;text-align:center;margin-bottom:12px}
  #lock button{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:700;cursor:pointer}
  #lock .err{color:var(--bad);font-size:12px;height:16px;margin-bottom:6px}
  body.locked .wrap{display:none}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--good);color:#062611;padding:10px 18px;border-radius:10px;font-weight:700;font-size:13px;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1}.hide{display:none}
  .scopetog{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .scopetog button{background:transparent;color:var(--muted);border:none;padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer}
  .scopetog button.on{background:var(--accent);color:#fff}
</style>
</head>
<body class="locked">
<div id="lock"><div class="box">
  <h2>The Bly Team Conversion Tracker</h2>
  <p>Enter the team passcode to view.</p>
  <div class="err" id="lockErr"></div>
  <input type="password" id="lockInput" placeholder="Passcode" autocomplete="off">
  <button id="lockBtn">Unlock</button>
</div></div>

<div class="wrap">
  <div class="topbar">
    <header class="top">
      <div><h1>The Bly Team Conversion Tracker</h1><div class="sub" id="rangeLabel"></div></div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <div id="scopeToggle" class="scopetog"><button data-scope="all" class="on">All Agents</button><button data-scope="isa">ISA-Converted</button></div>
        <div id="dispToggle" class="scopetog" title="Show percentages or exact numbers/$"><button data-disp="pct" class="on">%</button><button data-disp="num">#/$</button></div>
        <span class="sub">Period</span>
        <select class="periodSel" id="periodSel">
          <option value="mtd">This Month (MTD)</option>
          <option value="lastMonth">Last Month</option>
          <option value="ytd" selected>Year to Date</option>
          <option value="l3">Last 3 Months</option>
          <option value="l6">Last 6 Months</option>
          <option value="l12">Last 12 Months</option>
          <option value="lastYear">Last Year (2025)</option>
        </select>
      </div>
    </header>
    <div class="tabs" id="tabs"></div>
  </div>
  <div class="banner">Live data · Office production from <b>SISU</b> (non-rental sales) · ISA attribution from <b>Follow Up Boss</b> "Converted" tags matched to SISU by address · GCI from SISU.</div>
  <div id="view"></div>
  <footer id="foot"></footer>
</div>
<div class="toast" id="toast"></div>

let DATA=null;

const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function decryptPayload(pw){
  const {subtle}=window.crypto;
  const base=await subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await subtle.deriveKey({name:"PBKDF2",salt:b64(ENC.salt),iterations:100000,hash:"SHA-256"},
    base,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await subtle.decrypt({name:"AES-GCM",iv:b64(ENC.iv)},key,b64(ENC.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}

/* ===== helpers ===== */
const ISA_HEX={Jennifer:"#4f8cff",Kahla:"#a855f7",Sheryl:"#22c55e"};
const fmt=n=>Math.round(n).toLocaleString("en-US");
const money=n=>"$"+Math.round(n).toLocaleString("en-US");
const pct=n=>(n*100).toFixed(1)+"%";
const safe=(a,b)=>b>0?a/b:0;
const ALL_MONTHS=(()=>{const a=[];for(let y=2024;y<=2026;y++)for(let m=1;m<=12;m++)a.push(`${y}-${String(m).padStart(2,'0')}`);return a.filter(k=>k<="2026-07");})();
function lastN(n){return ALL_MONTHS.slice(-n);}
function monthsFor(id){
  const M=y=>[...Array(12)].map((_,i)=>`${y}-${String(i+1).padStart(2,'0')}`);
  const y26=M(2026).filter(k=>k<="2026-07");
  if(id==="mtd")return ["2026-07"];
  if(id==="lastMonth")return ["2026-06"];
  if(id==="ytd")return y26;
  if(id==="l3")return lastN(3);
  if(id==="l6")return lastN(6);
  if(id==="l12")return lastN(12);
  if(id==="lastYear"||id==="y2025")return M(2025);
  return y26;
}
const priorYear=k=>(+k.slice(0,4)-1)+k.slice(4);
function officeSum(keys){const t={units:0,volume:0,gci:0,buyers:0,listings:0,leases:0,leaseGci:0,uc:0,ucVol:0};
  keys.forEach(k=>{const o=DATA.office[k];if(o)for(const f in t)t[f]+=(o[f]||0);});return t;}
function isaMonth(name,key){ // key "YYYY-MM"; ISA data is 2026 only, keyed by month number
  if(!key.startsWith("2026"))return null;
  const m=String(+key.slice(5)); return (DATA.isa[name]||{})[m]||null;}
function isaSum(name,keys){const t={sale_u:0,sale_v:0,sale_g:0,rent_u:0,rent_g:0,co:0,buy_u:0,buy_v:0,buy_g:0,sell_u:0,sell_v:0,sell_g:0};
  keys.forEach(k=>{const d=isaMonth(name,k);if(d)for(const x in t)t[x]+=d[x]||0;});return t;}
function isaGci(name,keys){const s=isaSum(name,keys);return s.sale_g+s.rent_g;}
function isaIncome(name,keys){const c=DATA.comp;const g=isaGci(name,keys);
  if(name===c.manager){let others=0;DATA.isaNames.forEach(n=>{if(n!==c.manager)others+=isaGci(n,keys);});
    return (c.closerShare+c.managerShare)*g + c.managerShare*others;}
  return c.closerShare*g;}
function growth(a,b){if(!b)return null;return (a-b)/Math.abs(b);}
function deltaHTML(g,suffix){if(g===null)return `<div class="delta flat">—</div>`;
  const cls=g>0?"up":g<0?"down":"flat",arw=g>0?"▲":g<0?"▼":"■";
  return `<div class="delta ${cls}">${arw} ${(Math.abs(g)*100).toFixed(1)}% ${suffix||"vs prior yr"}</div>`;}
function cardsHTML(items){return `<div class="grid cards">`+items.map(c=>`<div class="card">
  <div class="label">${c.label}</div><div class="value">${c.value}</div>
  ${c.delta||(c.sub?`<div class="delta flat">${c.sub}</div>`:'')}</div>`).join("")+`</div>`;}

const GKEY="blyISAgoals.v1";
const DEFAULT_GOALS={saleClosings:6,gci:60000,income:2000};
function loadGoals(){try{return JSON.parse(localStorage.getItem(GKEY))||{};}catch(e){return{};}}
function goalsFor(n){return {...DEFAULT_GOALS,...(loadGoals()[n]||{})};}
function saveGoals(n,o){const a=loadGoals();a[n]={...(a[n]||{}),...o};localStorage.setItem(GKEY,JSON.stringify(a));}

/* sortable-table helpers */
function sortHdr(key,label,cls,state){const active=state.key===key;const arw=active?(state.dir<0?' ▼':' ▲'):'';
  return `<th class="${cls||''}" data-sk="${key}" style="cursor:pointer;user-select:none"${active?' data-active="1"':''}>${label}${arw}</th>`;}
function applySort(list,state,acc){const f=acc[state.key];if(!f)return list;
  return list.slice().sort((a,b)=>{const va=f(a),vb=f(b);
    if(typeof va==='string')return va.localeCompare(vb)*state.dir;
    return ((va||0)-(vb||0))*state.dir;});}
function bindSortHeaders(sel,state){document.querySelectorAll(sel+" th[data-sk]").forEach(th=>th.onclick=(e)=>{
  e.stopPropagation();const k=th.dataset.sk;
  if(state.key===k)state.dir*=-1; else {state.key=k;state.dir=(k==='name')?1:-1;}
  render();});}

function render(){
  const id=document.getElementById("periodSel").value;
  const keys=monthsFor(id);
  const label={mtd:"This month (Jul 2026)",lastMonth:"Last month (Jun 2026)",ytd:"Year to date 2026",l3:"Last 3 months",l6:"Last 6 months",l12:"Last 12 months",lastYear:"Last year (2025)"}[id]||id;
  document.getElementById("rangeLabel").textContent=label+" · "+keys[0]+" → "+keys[keys.length-1];
  clr();
  if(currentTab==="Office")renderOffice(keys,id);
  else if(currentTab==="Agents"){ currentAgent?renderAgentDetail(currentAgent,keys):renderAgents(keys); }
  else if(currentTab==="ISATeam"){ currentISA?renderISA(currentISA,keys,id):renderISATeam(keys,id); }
  else renderOffice(keys,id);
}

function renderOffice(keys,id){
  const off=officeSum(keys), prev=officeSum(keys.map(priorYear));

/* ===== SISU-style circle funnel (from FUB lead pipeline) ===== */
function funnelCounts(rows,keys){
  const co=rows.filter(L=>inKeys(L[1],keys)), rk=L=>STAGE_RANK[DATA.dsAll.stageList[L[3]].toLowerCase()]??-1;
  return {leads:co.length,contacted:co.filter(L=>L[5]).length,appt:co.filter(L=>rk(L)>=3).length,
    met:co.filter(L=>rk(L)>=4).length,uc:co.filter(L=>rk(L)>=7).length,closed:co.filter(L=>rk(L)>=8).length};
}
function ring(count,frac,color,label,sub){
  const r=40,c=2*Math.PI*r,off=c*(1-Math.max(0,Math.min(1,frac)));
  return `<div style="text-align:center;min-width:104px">
    <svg width="104" height="104" viewBox="0 0 104 104">
      <circle cx="52" cy="52" r="${r}" fill="none" stroke="var(--panel2)" stroke-width="9"/>
      <circle cx="52" cy="52" r="${r}" fill="none" stroke="${color}" stroke-width="9" stroke-linecap="round"
        stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 52 52)"/>
      <text x="52" y="58" text-anchor="middle" fill="var(--text)" font-size="22" font-weight="700">${fmt(count)}</text></svg>
    <div class="sub" style="font-weight:600;color:var(--text)">${label}</div>
    <div class="sub" style="font-size:11px">${sub||'&nbsp;'}</div></div>`;
}
function funnelRow(rows,keys){
  const f=funnelCounts(rows,keys),max=f.leads||1;
  const st=[["Leads",f.leads,"#93a0bd"],["Contacted",f.contacted,"#4f8cff"],["Appt Set",f.appt,"#38bdf8"],["Met",f.met,"#a855f7"],["Under Contract",f.uc,"#f59e0b"],["Closed",f.closed,"#22c55e"]];
  let h='<div style="display:flex;flex-wrap:wrap;align-items:center;gap:4px;justify-content:center">';
  st.forEach(([lbl,v,col],i)=>{
    if(i>0){const prev=st[i-1][1];const btw=dispMode==='pct'?pct(safe(v,prev)):('−'+fmt(prev-v));
      h+=`<div class="sub" style="min-width:40px;text-align:center;font-size:11px"><b style="color:var(--text)">${btw}</b><br>▶</div>`;}
    const sub=i>0?(dispMode==='pct'?pct(safe(v,max))+' of leads':fmt(v)+' of '+fmt(max)):'';
    h+=ring(v,v/max,col,lbl,sub);});
  return h+'</div>';
}
function circleFunnel(rows,keys){

function isaAgg(keys){
  const D=DATA.dsAll;
  return DATA.isaNames.map(name=>{
    const mask=maskFor(name);
    const rows=D.leads.filter(L=>(L[0]&mask)!==0);
    const cohort=rows.filter(L=>inKeys(L[1],keys));
    let contacted=0,apptPlus=0,metPlus=0,closed=0;
    cohort.forEach(L=>{if(L[5])contacted++;const rk=STAGE_RANK[D.stageList[L[3]].toLowerCase()];if(rk>=3)apptPlus++;if(rk>=4)metPlus++;});
    rows.filter(L=>L[7]===1&&inKeys(L[6],keys)).forEach(()=>closed++);
    const leads=cohort.length, s=isaSum(name,keys), gci=s.sale_g+s.rent_g, inc=isaIncome(name,keys);
    return {name,leads,contacted,apptPlus,metPlus,closed,
      contact:safe(contacted,leads),appt:safe(apptPlus,leads),met:safe(metPlus,apptPlus),close:safe(closed,metPlus),
      sales:s.sale_u,buyU:s.buy_u,sellU:s.sell_u,vol:s.sale_v,gci,co:s.co,inc};
  });
}

    // coaching: biggest gap vs goal, and income impact of closing that gap

    if(r_appt<GOAL.appt) levers.push(["Raise lead→appointment to "+pct(GOAL.appt),(GOAL.appt-r_appt)*a.leads*r_met*r_close]);
    if(r_met<GOAL.met) levers.push(["Improve appt→met (fewer no-shows) to "+pct(GOAL.met),(GOAL.met-r_met)*a.apptPlus*r_close]);
    if(r_close<GOAL.close) levers.push(["Strengthen met→close to "+pct(GOAL.close),(GOAL.close-r_close)*a.metPlus]);
    levers.forEach(l=>l[2]=l[1]*incPerClose*share);
    levers.sort((x,y)=>y[2]-x[2]);
    const coachHTML=levers.length?levers.slice(0,3).map((l,i)=>`
      <div style="border-left:3px solid ${i===0?'var(--good)':'var(--accent)'};background:var(--panel2);border-radius:10px;padding:11px 13px;margin-bottom:9px;font-size:13.5px">
        <b>${l[0]}</b> → <span class="up">about +${l[1].toFixed(1)} closings, +${money(l[2])} income (lifetime pipeline)</span></div>`).join("")
      :`<div class="sub">On or above goal across the converted-lead funnel — the main lever is more volume (leads &amp; dials).</div>`;
    pipeline=`<div class="two">
      <div class="panel"><h2>${name} — converted-lead pipeline <span class="hint">lifetime tags · ${fmt(a.leads)} leads</span></h2>${stagesHTML}
        <div class="sub" style="margin-top:10px">2026 activity to converted leads: <b>${fmt(a.calls2026)}</b> calls · <b>${fmt(a.texts2026)}</b> texts</div></div>
      <div class="panel"><h2>💡 Coaching <span class="hint">ranked by income impact</span></h2>${coachHTML}</div>
    </div>`;
  }
  // ===== interactive forecast / goal planner =====
  let forecast="", base=null;
  if(a){
    const totClose=s.sale_u+s.rent_u;
    const avgGci=Math.round(safe(gci,totClose)||safe(off.gci,off.units)||10000);
    base={leads:a.leads,contact:safe(a.contacted,a.leads),c2a:safe(a.apptPlus,a.contacted),
      a2m:safe(a.metPlus,a.apptPlus),m2c:safe(a.closedStage,a.metPlus),avgGci,
      share:isMgr?(DATA.comp.closerShare+DATA.comp.managerShare):DATA.comp.closerShare};
    const sl=(id,lbl,val,unit)=>`<div class="slider"><div class="row"><span class="sub">${lbl}</span><span class="v" id="v_${id}">${val}${unit}</span></div>
      <input type="range" id="${id}" min="0" max="100" step="1" value="${Math.round(val)}"></div>`;
    const leadMax=Math.max(300,Math.ceil(a.leads*1.5/50)*50);
    forecast=`<div class="panel"><h2>🎯 Forecast &amp; goal planner <span class="hint">drag the pipeline to see what hits your target</span></h2>
      <div class="two">
        <div>
          <div class="slider"><div class="row"><span class="sub">Converted leads (planning horizon)</span><span class="v" id="v_fLeads">${a.leads}</span></div>
            <input type="range" id="fLeads" min="0" max="${leadMax}" step="5" value="${a.leads}"></div>
          ${sl("fContact","Contact rate",Math.round(base.contact*100),"%")}
          ${sl("fC2A","Contacted → Appointment",Math.round(base.c2a*100),"%")}
          ${sl("fA2M","Appointment → Met",Math.round(base.a2m*100),"%")}
          ${sl("fM2C","Met → Close",Math.round(base.m2c*100),"%")}
          <div class="slider"><div class="row"><span class="sub">Avg GCI per closing</span><span class="v" id="v_fGci">${money(avgGci)}</span></div>

        </div>

          <div class="fcout"><div class="lbl">Projected closings</div><div class="big" id="oClose">–</div></div>

  document.getElementById("sg").onclick=()=>{const o={};document.querySelectorAll("[data-gk]").forEach(i=>o[i.dataset.gk]=parseFloat(i.value)||0);saveGoals(name,o);toast("Goals saved");render();};
  document.getElementById("rg").onclick=()=>{const a=loadGoals();delete a[name];localStorage.setItem(GKEY,JSON.stringify(a));toast("Reset");render();};
  if(base) bindForecast(base);

function bindForecast(base){
  const $=id=>document.getElementById(id);
  const rd=()=>({leads:+$("fLeads").value,contact:+$("fContact").value/100,c2a:+$("fC2A").value/100,
    a2m:+$("fA2M").value/100,m2c:+$("fM2C").value/100,avgGci:+$("fGci").value,target:+$("fTarget").value});
  function recompute(){
    const v=rd();
    $("v_fLeads").textContent=v.leads;$("v_fContact").textContent=Math.round(v.contact*100)+"%";
    $("v_fC2A").textContent=Math.round(v.c2a*100)+"%";$("v_fA2M").textContent=Math.round(v.a2m*100)+"%";
    $("v_fM2C").textContent=Math.round(v.m2c*100)+"%";$("v_fGci").textContent=money(v.avgGci);
    const closings=v.leads*v.contact*v.c2a*v.a2m*v.m2c;
    const gci=closings*v.avgGci, inc=gci*base.share;
    $("oClose").textContent=closings.toFixed(1);
    $("oGci").textContent=money(gci);
    $("oInc").textContent=money(inc);
    const incPerLead=v.contact*v.c2a*v.a2m*v.m2c*v.avgGci*base.share;
    const incPerClose=v.avgGci*base.share;
    const gap=v.target-inc;
    let plan;
    if(inc>=v.target){plan=`<span class="up">On track — projected income beats target by ${money(inc-v.target)}.</span>`;}
    else{
      const leadsNeed=incPerLead>0?Math.ceil(v.target/incPerLead):null;
      const closeNeed=incPerClose>0?(v.target/incPerClose):null;
      const m2cNeed=(v.leads*v.contact*v.c2a*v.a2m)>0?v.target/(v.leads*v.contact*v.c2a*v.a2m*v.avgGci*base.share):null;
      plan=`Gap to target: <b class="down">${money(gap)}</b>.<br>
        • Need <b>${leadsNeed!=null?leadsNeed:'—'}</b> converted leads at these rates (${leadsNeed!=null?'+'+(leadsNeed-v.leads):'—'} more), or<br>
        • Close <b>${closeNeed!=null?closeNeed.toFixed(1):'—'}</b> deals total, or<br>
        • Lift Met→Close to <b>${m2cNeed!=null&&m2cNeed<=1?Math.round(m2cNeed*100)+'%':'not reachable on this lever alone'}</b>.`;
    }
    $("oPlan").innerHTML=plan;
  }
  ["fLeads","fContact","fC2A","fA2M","fM2C","fGci"].forEach(id=>$(id).oninput=recompute);
  $("fTarget").oninput=recompute;
  $("fReset").onclick=()=>{$("fLeads").value=base.leads;$("fContact").value=Math.round(base.contact*100);
    $("fC2A").value=Math.round(base.c2a*100);$("fA2M").value=Math.round(base.a2m*100);
    $("fM2C").value=Math.round(base.m2c*100);$("fGci").value=base.avgGci;recompute();};
  recompute();
}

/* ===== period-aware analytics from per-lead dataset ===== */
const STAGE_ORDER=['Lead','Attempted contact','Spoke with customer','Appointment set','No Show','Showing homes','Met with customer','Listing agreement','Active listing','Submitting offers','Under contract','Closed','Nurture','Unresponsive','Archive'];
const STAGE_RANK={'lead':0,'attempted contact':1,'spoke with customer':2,'appointment set':3,'no show':3,'showing homes':4,'met with customer':4,'listing agreement':5,'active listing':5,'submitting offers':6,'under contract':7,'closed':8};
function maskFor(name){return {Jennifer:1,Kahla:2,Sheryl:4}[name]||0;}
/* per-agent SISU production (total, all sources) matched by normalized name */
function normName(n){return String(n||'').toLowerCase().replace(/[^a-z0-9]/g,'');}
function agentProdSum(fubName,keys){
  const m=(DATA.agentProd.monthly||{})[normName(fubName)]||{};
  const t={u:0,v:0,g:0};keys.forEach(k=>{const c=m[k];if(c){t.u+=c.u;t.v+=c.v;t.g+=c.g;}});return t;}
function agentHasProd(fubName){return !!(DATA.agentProd.monthly||{})[normName(fubName)];}
/* eXp paid (Company Commission) per agent, matched by first+last name (eXp uses legal names) */
function firstLast(n){const t=String(n||'').toLowerCase().replace(/[^a-z ]/g,'').split(/\s+/).filter(Boolean);
  return t.length>=2?t[0]+t[t.length-1]:(t[0]||'');}
function expPaidSum(fubName,keys){
  const m=(DATA.exp&&DATA.exp.monthly||{})[firstLast(fubName)]||{};
  let t=0;(keys||[]).forEach(k=>{if(m[k])t+=m[k].paid;});return t;}
function expCoSum(fubName,keys){
  const m=(DATA.exp&&DATA.exp.monthly||{})[firstLast(fubName)]||{};
  let t=0;(keys||[]).forEach(k=>{if(m[k])t+=m[k].co||0;});return t;}
function expTeamSum(keys){const tm=(DATA.exp&&DATA.exp.team)||{};const o={paid:0,co:0,gci:0};
  keys.forEach(k=>{if(tm[k]){o.paid+=tm[k].paid;o.co+=tm[k].co;o.gci+=tm[k].gci;}});return o;}
/* record: 0 mask,1 addedYM,2 srcIdx,3 stageIdx,4 agentIdx,5 contacted,6 closeYM,7 closed */
function leadRows(mask){return DATA.ds.leads.filter(L=>(L[0]&mask)!==0);}
function inKeys(ym,keys){return !!ym&&keys.indexOf(ym)>=0;}
function computeAnalytics(mask,keys){
  const rows=leadRows(mask);
  const cohort=rows.filter(L=>inKeys(L[1],keys));
  const closings=rows.filter(L=>L[7]===1&&inKeys(L[6],keys));
  const src={},stg={},agc={};
  cohort.forEach(L=>{const s=DATA.ds.srcList[L[2]];(src[s]=src[s]||{leads:0,closings:0}).leads++;
    const st=DATA.ds.stageList[L[3]];stg[st]=(stg[st]||0)+1;});
  closings.forEach(L=>{const s=DATA.ds.srcList[L[2]];(src[s]=src[s]||{leads:0,closings:0}).closings++;
    const a=DATA.ds.agentList[L[4]];agc[a]=(agc[a]||0)+1;});
  return {src,stg,agc,cohort:cohort.length,closings:closings.length};
}
function bar(w,color){return `<span style="display:inline-block;width:60px;height:8px;background:var(--panel2);border-radius:4px;vertical-align:middle;margin-right:8px;position:relative"><span style="position:absolute;left:0;top:0;bottom:0;width:${w.toFixed(0)}%;background:${color};border-radius:4px"></span></span>`;}
function srcBlock(A){
  const P=dispMode==='pct';
  const tot=A.closings||1,rows=Object.entries(A.src).sort((a,b)=>(b[1].closings-a[1].closings)||(b[1].leads-a[1].leads)).slice(0,9);
  if(!rows.length)return '<div class="sub">No data in this period.</div>';
  const shareH=P?'% of closings':'Closings share';
  return `<table><thead><tr><th>Lead source</th><th class="num">Leads</th><th class="num">Closings</th><th class="num">${shareH}</th></tr></thead><tbody>`+
    rows.map(([s,v])=>{const share=P?pct(v.closings/tot):fmt(v.closings)+' of '+fmt(A.closings);
      return `<tr><td>${s}</td><td class="num">${fmt(v.leads)}</td><td class="num">${fmt(v.closings)}</td><td class="num">${bar(v.closings/tot*100,'var(--accent)')}${share}</td></tr>`;}).join("")+`</tbody></table>`;
}
function stageBlock(A){
  const st=A.stg,max=Math.max(...Object.values(st),1);
  const html=STAGE_ORDER.filter(s=>st[s]).map(s=>{const v=st[s],w=Math.max(4,v/max*100),inact=['Nurture','Unresponsive','Archive','No Show'].includes(s);
    return `<div class="funnel-row"><div class="funnel-name">${s}</div><div class="funnel-bar"><div class="funnel-fill" style="width:${w}%${inact?';background:#4b5675':''}">${fmt(v)}</div></div></div>`;}).join("");
  return html||'<div class="sub">No leads added in this period.</div>';
}
function closingAgentsBlock(A){
  const rows=Object.entries(A.agc).sort((a,b)=>b[1]-a[1]).slice(0,12),max=Math.max(...rows.map(r=>r[1]),1);
  if(!rows.length)return '<div class="sub">No closings in this period.</div>';
  return `<table><thead><tr><th>Closing agent</th><th class="num">Closings</th></tr></thead><tbody>`+
    rows.map(([a,v])=>`<tr><td>${a}${a==='Deb Bly Team'?' <span class="sub">(shared)</span>':''}</td><td class="num">${bar(v/max*100,'var(--good)')}${fmt(v)}</td></tr>`).join("")+`</tbody></table>`;
}
function analyticsPanels(mask,keys){
  const A=computeAnalytics(mask,keys);
  return `<div class="two">
    <div class="panel"><h2>Top closing agents <span class="hint">closed in period · ${fmt(A.closings)}</span></h2>${closingAgentsBlock(A)}</div>
    <div class="panel"><h2>Lead source mix <span class="hint">leads &amp; closings in period</span></h2>${srcBlock(A)}</div></div>
    <div class="panel"><h2>Pipeline by stage <span class="hint">leads added in period · current stage · ${fmt(A.cohort)}</span></h2>${stageBlock(A)}</div>`;
}

/* ===== Agent Insights tab (period-aware, clickable) ===== */
/* ===== all-source scope (toggle: ISA-converted vs All leads) ===== */
let scopeMode='all';
function dsAllRows(){return DATA.dsAll.leads.filter(L=> scopeMode==='isa' ? L[0]>0 : true);}
function scopeLabel(){return scopeMode==='isa'?'ISA-converted leads':'all leads (all sources)';}
function computeAll(keys){

  const src={},stg={},agc={};
  cohort.forEach(L=>{const s=D.srcList[L[2]];(src[s]=src[s]||{leads:0,closings:0}).leads++;const st=D.stageList[L[3]];stg[st]=(stg[st]||0)+1;});
  closings.forEach(L=>{const s=D.srcList[L[2]];(src[s]=src[s]||{leads:0,closings:0}).closings++;const a=D.agentList[L[4]];agc[a]=(agc[a]||0)+1;});
  return {src,stg,agc,cohort:cohort.length,closings:closings.length};
}
function analyticsPanelsAll(keys){

  return `<div class="two">
    <div class="panel"><h2>Top closing agents <span class="hint">${lbl} · closed in period · ${fmt(A.closings)}</span></h2>${closingAgentsBlock(A)}</div>
    <div class="panel"><h2>Lead source mix <span class="hint">${lbl} · leads &amp; closings</span></h2>${srcBlock(A)}</div></div>
    <div class="panel"><h2>Pipeline by stage <span class="hint">${lbl} · leads added in period · ${fmt(A.cohort)}</span></h2>${stageBlock(A)}</div>`;
}
function agentAgg(keys){
  const D=DATA.dsAll, rows=dsAllRows(), cohort=rows.filter(L=>inKeys(L[1],keys));
  const per={};const rec=a=>per[a]||(per[a]={leads:0,contacted:0,apptPlus:0,metPlus:0,closed:0});
  cohort.forEach(L=>{const r=rec(D.agentList[L[4]]);r.leads++;if(L[5])r.contacted++;
    const rk=STAGE_RANK[D.stageList[L[3]].toLowerCase()];if(rk>=3)r.apptPlus++;if(rk>=4)r.metPlus++;});
  rows.filter(L=>L[7]===1&&inKeys(L[6],keys)).forEach(L=>rec(D.agentList[L[4]]).closed++);
  return Object.entries(per).map(([name,v])=>({name,...v,contact:safe(v.contacted,v.leads),
    appt:safe(v.apptPlus,v.leads),met:safe(v.metPlus,v.apptPlus),close:safe(v.closed,v.metPlus)}));
}
function renderAgents(keys){
  let list=agentAgg(keys).filter(r=>r.leads>=5||r.closed>0);
  list.forEach(r=>{const p=agentProdSum(r.name,keys);r.pu=p.u;r.pg=p.g;r.ep=expPaidSum(r.name,keys);});
  const acc={name:r=>r.name,leads:r=>r.leads,contact:r=>r.contact,appt:r=>r.appt,met:r=>r.met,close:r=>r.close,closed:r=>r.closed,pu:r=>r.pu,pg:r=>r.pg,ep:r=>r.ep};
  list=applySort(list,agentSort,acc);
  const real=list.filter(r=>r.name!=='Deb Bly Team'&&r.name!=='(unassigned)');
  const best=k=>Math.max(...real.map(r=>r[k]),0);
  const bC=best('contact'),bA=best('appt'),bM=best('met'),bCl=best('close'),bClo=best('closed');
  const hl=(v,b)=>v>=b&&b>0?' style="color:#4ade80;font-weight:700"':'';
  const P=dispMode==='pct';
  const body=list.map(r=>{
    return `<tr class="agrow" data-agent="${encodeURIComponent(r.name)}" style="cursor:pointer">
    <td>${r.name}${r.name==='Deb Bly Team'?' <span class="sub">(shared)</span>':''} <span class="sub">›</span></td>
    <td class="num">${fmt(r.leads)}</td><td class="num"${hl(r.contact,bC)}>${P?pct(r.contact):fmt(r.contacted)}</td>
    <td class="num"${hl(r.appt,bA)}>${P?pct(r.appt):fmt(r.apptPlus)}</td><td class="num"${hl(r.met,bM)}>${P?pct(r.met):fmt(r.metPlus)}</td>
    <td class="num"${hl(r.close,bCl)}>${P?pct(r.close):fmt(r.closed)}</td><td class="num"${hl(r.closed,bClo)}>${fmt(r.closed)}</td>
    <td class="num">${r.pu?fmt(r.pu):'–'}</td><td class="num">${r.pg?money(r.pg):'–'}</td>
    <td class="num">${r.ep?money(r.ep):'–'}</td></tr>`;}).join("");
  const leadHdr=scopeMode==='isa'?'ISA leads':'Leads', closeHdr=scopeMode==='isa'?'ISA closings':'Closings';
  const cH=P?['Contact%','→Appt%','Appt→Met%','Met→Close%']:['Contacted','Reached appt','Met','Closed'];
  const AH=(k,l,c)=>sortHdr(k,l,c,agentSort);
  const table=`<div style="overflow-x:auto"><table id="agentScore"><thead><tr>${AH('name','Sales agent','')}${AH('leads',leadHdr,'num')}${AH('contact',cH[0],'num')}${AH('appt',cH[1],'num')}${AH('met',cH[2],'num')}${AH('close',cH[3],'num')}${AH('closed',closeHdr,'num')}${AH('pu','Total closings','num')}${AH('pg','Total GCI','num')}${AH('ep','Paid to eXp','num')}</tr></thead><tbody>${body}</tbody></table></div>
    <div class="sub" style="margin-top:8px">Click any agent for their dashboard. Green = best on that metric. <b>Total closings/GCI</b> = all their SISU deals in the period (all sources). The leads/conversion columns follow the <b>${scopeMode==='isa'?'ISA-Converted':'All Agents'}</b> toggle.</div>`;
  const coach=[];
  real.filter(r=>r.leads>=10).forEach(r=>{const iss=[];
    if(r.contact<0.85)iss.push(`contact rate ${pct(r.contact)} (speed-to-lead)`);
    if(r.met<0.60)iss.push(`appt→met ${pct(r.met)} (confirm appts, cut no-shows)`);
    if(r.close<0.40)iss.push(`met→close ${pct(r.close)} (closing skills)`);
    if(iss.length)coach.push({name:r.name,iss,close:r.close});});
  coach.sort((a,b)=>a.close-b.close);
  const stars=real.filter(r=>r.leads>=10&&r.close>=0.65).sort((a,b)=>b.close-a.close);
  const coachHTML=coach.length?coach.map(c=>`<div style="border-left:3px solid var(--warn);background:var(--panel2);border-radius:10px;padding:11px 13px;margin-bottom:9px;font-size:13.5px"><b>${c.name}</b> — coach on: ${c.iss.join("; ")}.</div>`).join(""):'<div class="sub">No agents below coaching thresholds this period.</div>';
  const starHTML=stars.length?stars.map(s=>`<div style="border-left:3px solid var(--good);background:var(--panel2);border-radius:10px;padding:11px 13px;margin-bottom:9px;font-size:13.5px"><b>${s.name}</b> — ${pct(s.close)} met→close. Model their process.</div>`).join(""):'<div class="sub">—</div>';
  document.getElementById("view").innerHTML=`
    <div class="banner" style="margin-top:0">Sales-agent performance on <b>${scopeLabel()}</b> — toggle <b>All Agents / ISA-Converted</b> (top right) to switch scope. Cohort follows the period selector. Click an agent for their dashboard.</div>
    <div class="panel"><h2>Sales agent scorecard <span class="hint">ranked by closings</span></h2>${table}</div>
    <div class="two"><div class="panel"><h2>⭐ Strengths</h2>${starHTML}</div>
      <div class="panel"><h2>🎯 Needs coaching</h2>${coachHTML}</div></div>`;
  document.querySelectorAll(".agrow").forEach(el=>el.onclick=()=>{currentAgent=decodeURIComponent(el.dataset.agent);render();});
  bindSortHeaders("#agentScore",agentSort);
}
function agentPlanner(name,b){
  const sl=(id,lbl,val,unit,mn,mx,st)=>`<div class="slider"><div class="row"><span class="sub">${lbl}</span><span class="v" id="v_${id}">${val}${unit||''}</span></div>
    <input type="range" id="${id}" min="${mn}" max="${mx}" step="${st}" value="${val}"></div>`;
  const leadMax=Math.max(300,Math.ceil((b.leads||50)*1.5/25)*25);
  return `<div class="panel"><h2>🎯 Goal planner <span class="hint">pre-filled with ${name}'s actuals · set a goal, see what it takes</span></h2>
    <div class="two">
      <div>
        <div class="sub" style="margin-bottom:8px">Sliders start at ${name}'s <b>actual</b> rates for this period — drag to model a goal.</div>
        <div class="slider"><div class="row"><span class="sub">Leads (planning horizon)</span><span class="v" id="v_apLeads">${b.leads}</span></div>
          <input type="range" id="apLeads" min="0" max="${leadMax}" step="5" value="${b.leads}"></div>
        ${sl("apContact","Contact rate",Math.round(b.contact*100),"%",0,100,1)}
        ${sl("apL2A","Lead → Appointment",Math.round(b.l2a*100),"%",0,100,1)}
        ${sl("apA2M","Appointment → Met",Math.round(b.a2m*100),"%",0,100,1)}
        ${sl("apM2C","Met → Close",Math.round(b.m2c*100),"%",0,100,1)}
        <div class="slider"><div class="row"><span class="sub">Avg GCI per closing</span><span class="v" id="v_apGci">${money(b.avgGci)}</span></div>
          <input type="range" id="apGci" min="2000" max="30000" step="500" value="${b.avgGci}"></div>
        <button class="btn ghost" id="apReset" style="margin-top:4px">Reset to actuals</button>
      </div>
      <div>
        <div class="fcout"><div class="lbl">Projected closings</div><div class="big" id="apoClose">–</div></div>
        <div class="fcout"><div class="lbl">Projected GCI</div><div class="big up" id="apoGci">–</div></div>
        <div style="margin-top:12px;display:flex;align-items:center;justify-content:space-between;gap:10px">
          <span class="sub">Goal GCI</span><input class="fcin" type="number" id="apTarget" step="5000" value="${Math.max(Math.round((b.leads*b.contact*b.l2a*b.a2m*b.m2c*b.avgGci)/5000)*5000*1.3,50000)}"></div>
        <div class="sub" id="apoPlan" style="margin-top:10px;line-height:1.6"></div>
        <div class="sub" style="margin-top:10px">Full business-plan calculator: <a href="https://kevinajones.github.io/bly-team-calculators/business-plan-standalone.html" target="_blank" rel="noopener" style="color:var(--accent)">open ↗</a></div>
      </div>
    </div></div>`;
}
function bindAgentPlanner(b){
  const $=id=>document.getElementById(id);
  if(!$("apLeads"))return;
  const rd=()=>({leads:+$("apLeads").value,contact:+$("apContact").value/100,l2a:+$("apL2A").value/100,
    a2m:+$("apA2M").value/100,m2c:+$("apM2C").value/100,avgGci:+$("apGci").value,target:+$("apTarget").value});
  function recompute(){const v=rd();
    $("v_apLeads").textContent=v.leads;$("v_apContact").textContent=Math.round(v.contact*100)+"%";
    $("v_apL2A").textContent=Math.round(v.l2a*100)+"%";$("v_apA2M").textContent=Math.round(v.a2m*100)+"%";
    $("v_apM2C").textContent=Math.round(v.m2c*100)+"%";$("v_apGci").textContent=money(v.avgGci);
    const closings=v.leads*v.contact*v.l2a*v.a2m*v.m2c, gci=closings*v.avgGci;
    $("apoClose").textContent=closings.toFixed(1);$("apoGci").textContent=money(gci);
    const perLead=v.contact*v.l2a*v.a2m*v.avgGci*v.m2c;
    let plan;
    if(gci>=v.target){plan=`<span class="up">On track — projected GCI beats the goal by ${money(gci-v.target)}.</span>`;}
    else{const leadsNeed=perLead>0?Math.ceil(v.target/perLead):null;
      const closeNeed=v.avgGci>0?v.target/v.avgGci:null;
      const m2cNeed=(v.leads*v.contact*v.l2a*v.a2m*v.avgGci)>0?v.target/(v.leads*v.contact*v.l2a*v.a2m*v.avgGci):null;
      plan=`Gap to goal: <b class="down">${money(v.target-gci)}</b>.<br>
        • Need <b>${leadsNeed!=null?leadsNeed:'—'}</b> leads at these rates (${leadsNeed!=null?(leadsNeed-v.leads>=0?'+':'')+(leadsNeed-v.leads):'—'} vs now), or<br>
        • Close <b>${closeNeed!=null?closeNeed.toFixed(1):'—'}</b> deals, or<br>
        • Lift Met→Close to <b>${m2cNeed!=null&&m2cNeed<=1?Math.round(m2cNeed*100)+'%':'not reachable on this lever alone'}</b>.`;}
    $("apoPlan").innerHTML=plan;
  }
  ["apLeads","apContact","apL2A","apA2M","apM2C","apGci","apTarget"].forEach(id=>$(id).oninput=recompute);
  $("apReset").onclick=()=>{$("apLeads").value=b.leads;$("apContact").value=Math.round(b.contact*100);
    $("apL2A").value=Math.round(b.l2a*100);$("apA2M").value=Math.round(b.a2m*100);$("apM2C").value=Math.round(b.m2c*100);$("apGci").value=b.avgGci;recompute();};
  recompute();
}
function renderAgentDetail(name,keys){
  const D=DATA.dsAll;
  const rows=D.leads.filter(L=>(scopeMode==='isa'?L[0]>0:true) && D.agentList[L[4]]===name);
  const cohort=rows.filter(L=>inKeys(L[1],keys));
  const clP=rows.filter(L=>L[7]===1&&inKeys(L[6],keys));
  const contacted=cohort.filter(L=>L[5]).length;
  const rk=L=>STAGE_RANK[D.stageList[L[3]].toLowerCase()];
  const apptPlus=cohort.filter(L=>rk(L)>=3).length, metPlus=cohort.filter(L=>rk(L)>=4).length;
  const src={},stg={};cohort.forEach(L=>{const s=D.srcList[L[2]];(src[s]=src[s]||{leads:0,closings:0}).leads++;stg[D.stageList[L[3]]]=(stg[D.stageList[L[3]]]||0)+1;});
  clP.forEach(L=>{const s=D.srcList[L[2]];(src[s]=src[s]||{leads:0,closings:0}).closings++;});
  const scoped={src,stg,agc:{},cohort:cohort.length,closings:clP.length};
  const feed={Jennifer:0,Kahla:0,Sheryl:0};cohort.forEach(L=>{if(L[0]&1)feed.Jennifer++;if(L[0]&2)feed.Kahla++;if(L[0]&4)feed.Sheryl++;});
  const cards=cardsHTML([
    {label:"Leads (period)",value:fmt(cohort.length)},
    {label:"Contact rate",value:pct(safe(contacted,cohort.length))},
    {label:"Reached appointment",value:fmt(apptPlus),sub:pct(safe(apptPlus,cohort.length))+" of leads"},
    {label:"Appt → Met",value:pct(safe(metPlus,apptPlus))},
    {label:"Met → Close",value:pct(safe(clP.length,metPlus))},
    {label:"Closings (period)",value:fmt(clP.length)},
  ]);
  const funnel=[["Leads",cohort.length],["Contacted",contacted],["Reached appt",apptPlus],["Met",metPlus],["Closed",clP.length]]
    .map(([l,v],i,arr)=>{const max=arr[0][1]||1,w=Math.max(5,v/max*100);
      const conv=i>0?`<div class="conv"><b>${pct(safe(v,arr[i-1][1]))}</b></div>`:`<div class="conv">&nbsp;</div>`;
      return `<div class="funnel-row"><div class="funnel-name">${l}</div><div class="funnel-bar"><div class="funnel-fill" style="width:${w}%">${fmt(v)}</div></div>${conv}</div>`;}).join("");
  const feedHTML=Object.entries(feed).map(([n,v])=>`<tr><td><span class="dot" style="background:${ISA_HEX[n]}"></span>${n}</td><td class="num">${fmt(v)}</td><td class="num">${pct(safe(v,cohort.length))}</td></tr>`).join("");
  // total SISU production (all sources) for this agent
  const prod=agentProdSum(name,keys), prodPrev=agentProdSum(name,keys.map(priorYear));
  const hasProd=agentHasProd(name);
  const agCo=expCoSum(name,keys);
  const prodCards=hasProd?cardsHTML([
    {label:"Total closings",value:fmt(prod.u),delta:deltaHTML(growth(prod.u,prodPrev.u))},
    {label:"Total volume",value:money(prod.v),delta:deltaHTML(growth(prod.v,prodPrev.v))},
    {label:"Total GCI",value:money(prod.g),delta:deltaHTML(growth(prod.g,prodPrev.g))},
    {label:"GCI to team (CO$)",value:money(agCo),sub:pct(safe(agCo,prod.g))+" of GCI · team's share"},
    {label:"Agent share (GCI)",value:money(Math.max(0,prod.g-agCo)),sub:pct(safe(prod.g-agCo,prod.g))+" of GCI · agent's side"},
    {label:"Avg GCI / closing",value:money(safe(prod.g,prod.u)),sub:"all sources"},
    {label:"Paid to eXp",value:money(expPaidSum(name,keys)),sub:"company commission"},
  ]):`<div class="banner" style="margin-top:0">No SISU closed production matched for ${name} in this period (name may differ between systems, or no closings yet).</div>`;
  const contactRate=safe(contacted,cohort.length), metClose=safe(clP.length,metPlus);
  const planBase={leads:cohort.length||50,contact:contactRate,l2a:safe(apptPlus,cohort.length),
    a2m:safe(metPlus,apptPlus),m2c:metClose,avgGci:Math.round(safe(prod.g,prod.u)||12000)};
  const calcPanel=agentPlanner(name,planBase);
  const iconCards=cardsHTML([
    {label:"🏠 Total closings",value:fmt(prod.u)},{label:"💰 Total GCI",value:money(prod.g)},
    {label:"🏦 GCI to team (CO$)",value:money(agCo)},{label:"👤 Agent share",value:money(Math.max(0,prod.g-agCo))},
    {label:"📈 Volume",value:money(prod.v)},{label:"🏢 Paid to eXp",value:money(expPaidSum(name,keys))},
    {label:"🎯 Leads",value:fmt(cohort.length)},{label:"📞 Contact rate",value:pct(contactRate)},
    {label:"🤝 Met→Close",value:pct(metClose)},{label:"✅ Closings ("+(scopeMode==='isa'?'ISA':'all')+")",value:fmt(clP.length)},
  ]);
  const header=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap">
      <button class="btn ghost" id="agBack">← Back</button>
      <h2 style="margin:0">${name} <span class="sub" style="font-weight:400">· sales agent dashboard</span></h2>
      <div id="agViewTog" class="scopetog" style="margin-left:auto"><button data-view="full"${agentView==='full'?' class="on"':''}>Detailed</button><button data-view="cards"${agentView==='cards'?' class="on"':''}>Cards</button></div></div>`;
  const fullView=`
    <div class="sub" style="margin:2px 0 10px">Total production <span style="color:var(--muted)">(all deals, from SISU)</span></div>
    ${prodCards}
    ${hasProd?`<div class="panel"><h2>Monthly production <span class="hint">2026 · all sources</span></h2><div class="chartbox"><canvas id="agProd"></canvas></div></div>`:''}
    <div class="sub" style="margin:20px 0 8px;font-weight:700;color:var(--text)">Performance on ${scopeLabel()}</div>
    ${cards}
    <div class="panel"><h2>${name}'s pipeline <span class="hint">${scopeLabel()} · leads added in period</span></h2>${circleFunnel(rows,keys)}</div>
    <div class="two">
      <div class="panel"><h2>Conversion funnel <span class="hint">${scopeLabel()} · period cohort</span></h2>${funnel}</div>
      <div class="panel"><h2>Monthly closings <span class="hint">2026</span></h2><div class="chartbox"><canvas id="agc"></canvas></div></div>
    </div>
    <div class="two">
      <div class="panel"><h2>Lead source mix <span class="hint">leads &amp; closings</span></h2>${srcBlock(scoped)}</div>
      <div class="panel"><h2>Which ISA feeds them <span class="hint">period cohort</span></h2>
        <table><thead><tr><th>ISA</th><th class="num">Leads</th><th class="num">Share</th></tr></thead><tbody>${feedHTML}</tbody></table></div>
    </div>
    <div class="panel"><h2>Pipeline by stage <span class="hint">current stage · ${fmt(cohort.length)} leads</span></h2>${stageBlock(scoped)}</div>
    ${calcPanel}`;
  const cardsViewHTML=`${iconCards}${calcPanel}`;
  document.getElementById("view").innerHTML=header+(agentView==='cards'?cardsViewHTML:fullView);
  document.getElementById("agBack").onclick=()=>{currentAgent=null;render();};
  document.querySelectorAll("#agViewTog button").forEach(b=>b.onclick=()=>{agentView=b.dataset.view;render();});
  bindAgentPlanner(planBase);
  // monthly closings chart (all-time by 2026 month)
  const labs=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const mc=labs.map((_,i)=>rows.filter(L=>L[7]===1&&L[6]===`2026-${String(i+1).padStart(2,'0')}`).length);
  const ctx=document.getElementById("agc");
  if(ctx)charts.push(new Chart(ctx,{type:"bar",data:{labels:labs,datasets:[{label:"Closings",data:mc,backgroundColor:"#22c55e"}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{grid:{color:"rgba(147,160,189,.12)"},ticks:{color:"#93a0bd"}},y:{grid:{color:"rgba(147,160,189,.12)"},ticks:{color:"#93a0bd",precision:0}}}}}));
  // total SISU monthly production chart
  const pctx=document.getElementById("agProd");
  if(pctx){const pm=(DATA.agentProd.monthly||{})[normName(name)]||{};
    const units=labs.map((_,i)=>{const c=pm[`2026-${String(i+1).padStart(2,'0')}`];return c?c.u:0;});
    const gci=labs.map((_,i)=>{const c=pm[`2026-${String(i+1).padStart(2,'0')}`];return c?c.g:0;});
    charts.push(new Chart(pctx,{data:{labels:labs,datasets:[
      {type:"bar",label:"Closings",yAxisID:"y",data:units,backgroundColor:"#4f8cff"},
      {type:"line",label:"GCI",yAxisID:"y1",data:gci,borderColor:"#f59e0b",backgroundColor:"#f59e0b22",tension:.3,borderWidth:2,pointRadius:2}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#93a0bd"}}},
        scales:{x:{grid:{color:"rgba(147,160,189,.12)"},ticks:{color:"#93a0bd"}},
          y:{position:"left",grid:{color:"rgba(147,160,189,.12)"},ticks:{color:"#93a0bd",precision:0}},
          y1:{position:"right",grid:{display:false},ticks:{color:"#93a0bd",callback:v=>"$"+(v/1000).toFixed(0)+"k"}}}}}));}
}

/* ===== shell ===== */
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1600);}
function buildTabs(){const tabs=[["Office","Office / Team"],["ISATeam","ISA Team"],["Agents","Agent Insights"]];const w=document.getElementById("tabs");
  w.innerHTML=tabs.map(([id,lbl],i)=>`<div class="tab${i===0?' active':''}" data-tab="${id}">${lbl}</div>`).join("");

    dispMode=b.dataset.disp;
    document.querySelectorAll("#dispToggle button").forEach(x=>x.classList.toggle("on",x.dataset.disp===dispMode));
    render();});
  render();}

async function unlock(){const inp=document.getElementById("lockInput"),err=document.getElementById("lockErr");
  err.textContent="Decrypting…";
  try{DATA=await decryptPayload(inp.value);
    document.body.classList.remove("locked");document.getElementById("lock").style.display="none";start();}
  catch(e){err.textContent="Incorrect passcode";inp.value="";}}
document.getElementById("lockBtn").onclick=unlock;
document.getElementById("lockInput").addEventListener("keydown",e=>{if(e.key==="Enter")unlock();});
document.getElementById("lockInput").focus();
</script>
